<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOC Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg-base:#060a12;
  --bg-card:#0c1220;
  --accent-cyan:#00e5ff;
  --accent-red:#ff3a5c;
  --border-dim:rgba(255,255,255,0.07);
  --text-primary:#e8edf5;
  --text-muted:#5a6a80;
  --font-display:'Syne',sans-serif;
  --font-mono:'Space Mono',monospace;
}

body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-display);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* GRID BACKGROUND */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

/* LOGIN CARD */
.login-card {
  width:100%;
  max-width:400px;
  background:var(--bg-card);
  border:1px solid var(--border-dim);
  border-radius:16px;
  padding:2rem;
  backdrop-filter:blur(12px);
  box-shadow:0 0 40px rgba(0,229,255,0.08);
}

/* HEADER */
.brand {
  font-weight:800;
  font-size:1.6rem;
}
.brand span {
  color:var(--accent-cyan);
}

/* INPUT */
.input-field {
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-dim);
  border-radius:10px;
  padding:10px 14px;
  color:var(--text-primary);
  font-family:var(--font-mono);
  font-size:0.8rem;
  outline:none;
  margin-bottom:12px;
}

.input-field:focus {
  border-color:var(--accent-cyan);
  box-shadow:0 0 10px rgba(0,229,255,0.25);
}

/* BUTTON */
.login-btn {
  width:100%;
  background:var(--accent-cyan);
  border:none;
  border-radius:10px;
  padding:10px;
  font-weight:700;
  color:#000;
  cursor:pointer;
  transition:0.2s;
}

.login-btn:hover {
  opacity:0.85;
  box-shadow:0 0 12px rgba(0,229,255,0.4);
}

/* ERROR */
.error-text {
  color:var(--accent-red);
  font-size:0.7rem;
  margin-top:6px;
  display:none;
}
</style>
</head>

<body>

<form class="login-card" onsubmit="login(event)">

  <div class="text-center mb-4">
    <div class="brand"><span>SOC</span> AI</div>
    <div style="font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono);">
      Threat Intelligence Access
    </div>
  </div>

  <input id="username" class="input-field" placeholder="Username" autocomplete="username"/>
  <input id="password" type="password" class="input-field" placeholder="Password" autocomplete="current-password"/>

  <button class="login-btn" type="submit">Login</button>

  <div id="error" class="error-text">Invalid credentials</div>

</form>

<script>
if (localStorage.getItem("auth") === "true") {
  window.location.href = "ui.html";
}

function login(event) {
  event.preventDefault();

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  // TEMP LOGIN (frontend only)
  if (user === "admin" && pass === "admin123") {
    localStorage.setItem("auth", "true");
    window.location.href = "ui.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
